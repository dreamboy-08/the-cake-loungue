<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cake Lounge Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --cream: #fdf6ee;
      --brown: #6b3a2a;
      --brown-dark: #3d1f10;
      --rose: #e8917a;
      --rose-deep: #c9614a;
      --white: #ffffff;
      --text: #2c1810;
      --text-soft: #6b4c3b;
      --shadow-sm: 0 4px 20px rgba(60,20,10,.12);
      --radius-md: 20px;
      --transition: .35s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: var(--cream); color: var(--text); line-height: 1.6; }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1180px, 100%); margin: 0 auto; padding: 0 24px; }
    .page-header { background: rgba(253,246,238,.98); border-bottom: 1px solid rgba(107,76,59,.12); position: sticky; top: 0; z-index: 100; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; }
    .page-logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--brown-dark); }
    .page-logo span { color: var(--rose); }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 999px; font-weight: 600; transition: var(--transition); }
    .btn-light { background: var(--white); color: var(--rose-deep); border: 1px solid rgba(201,97,74,.2); }
    .btn-light:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .section-head { padding: 64px 0 24px; text-align: center; }
    .section-label { font-size: .75rem; font-weight: 700; letter-spacing:.18em; text-transform: uppercase; color: var(--rose-deep); margin-bottom: 12px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 4vw, 4rem); margin-bottom: 18px; }
    .section-sub { max-width: 700px; margin: 0 auto; color: var(--text-soft); font-size: 1rem; }
    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .category-pill { display: inline-flex; align-items: center; padding: 10px 18px; border-radius: 999px; background: rgba(201,97,74,.1); color: var(--brown-dark); font-size: .95rem; font-weight: 600; transition: var(--transition); }
    .category-pill:hover { transform: translateY(-1px); background: rgba(201,97,74,.18); }
    .category-section { margin-bottom: 64px; }
    .category-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .category-header h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.75rem, 3vw, 2.4rem); margin: 0; }
    .category-count { color: var(--text-soft); font-size: .95rem; }
    .products-grid { display: grid; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin: 0; }
    .product-card { background: var(--white); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); overflow: hidden; display: flex; flex-direction: column; }
    .product-img { position: relative; overflow: hidden; min-height: 200px; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-tag-ribbon { position: absolute; top: 18px; left: 18px; background: rgba(201,97,74,.95); color: var(--white); padding: 6px 12px; border-radius: 999px; font-size: .78rem; font-weight: 700; }
    .product-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .product-name { font-size: 1.05rem; font-weight: 700; color: var(--brown-dark); }
    .product-flavor { font-size: .95rem; color: var(--text-soft); }
    .product-stars { display: flex; align-items: center; gap: 8px; color: #d4a45a; font-size: .9rem; }
    .product-stars span { color: var(--text-soft); font-size: .85rem; }
    .product-footer { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: auto; }
    .product-price { font-size: 1.1rem; font-weight: 700; color: var(--brown-dark); }
    .product-price-old { margin-left: 8px; color: var(--text-soft); text-decoration: line-through; font-size: .9rem; }
    .add-to-cart { background: var(--rose-deep); color: var(--white); border: none; border-radius: 999px; padding: 12px 18px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
    .add-to-cart:hover { background: var(--brown-dark); }
    .back-note { display: inline-flex; align-items: center; gap: 10px; margin-top: 16px; color: var(--text-soft); }
    .back-note i { color: var(--rose-deep); }
    @media (max-width: 768px) {
      .page-header { padding: 5px 0; }
      .page-logo { font-size: 1.4rem; }
      .btn-light { padding: 8px 16px; font-size: 0.85rem; }
      .section-head { padding: 40px 0 20px; }
      .section-title { font-size: 2.2rem; }
      .category-tabs {
        flex-wrap: nowrap;
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 10px;
        -webkit-overflow-scrolling: touch;
      }
      .category-pill { white-space: nowrap; font-size: 0.85rem; padding: 8px 14px; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .product-body { padding: 12px; gap: 8px; }
      .product-name { font-size: 0.9rem; }
      .product-flavor { font-size: 0.8rem; }
      .product-footer { flex-direction: column; align-items: stretch; gap: 8px; }
      .product-price { font-size: 1rem; }
      .add-to-cart { padding: 12px; font-size: 0.85rem; justify-content: center; min-height: 44px; }
    }

    @media (max-width: 768px) {
      .hamburger { display: block !important; }
      .hide-mobile { display: none; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 15px; }
      .section-title { font-size: 1.8rem; }
      .products-grid { gap: 10px; }
      .product-body { padding: 10px; }
    }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="container header-inner">
      <a href="index.html" class="page-logo">Cake <span>Lounge</span></a>
      <div class="header-actions" style="display: flex; gap: 10px;">
        <a href="index.html" class="btn btn-light"><i class="fas fa-arrow-left"></i> <span class="hide-mobile">Back to Home</span></a>
        <button class="hamburger" onclick="toggleMobileMenu()" style="display: none; background: none; border: none; font-size: 1.5rem; color: var(--brown-dark); cursor: pointer;"><i class="fas fa-bars"></i></button>
      </div>
    </div>
  </header>

  <!-- Mobile Menu for Menu Page -->
  <div class="mobile-menu" id="mobileMenu" style="display: none; position: fixed; inset: 0; background: var(--cream); z-index: 200; flex-direction: column; align-items: center; justify-content: center; gap: 20px;">
    <button onclick="toggleMobileMenu()" style="position: absolute; top: 20px; right: 20px; background: none; border: none; font-size: 2rem; color: var(--brown-dark);"><i class="fas fa-times"></i></button>
    <a href="index.html" style="font-size: 1.5rem; font-weight: 700; font-family: 'Playfair Display', serif;">Home</a>
    <a href="custom-cake.html" style="font-size: 1.5rem; font-weight: 700; font-family: 'Playfair Display', serif;">Custom Cake</a>
    <a href="checkout.html" style="font-size: 1.5rem; font-weight: 700; font-family: 'Playfair Display', serif;">Checkout</a>
    <div id="mobileCategories" style="display: flex; flex-direction: column; gap: 10px; align-items: center; margin-top: 20px; overflow-y: auto; max-height: 50vh; width: 100%;">
      <h4 style="color: var(--rose-deep); text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem;">Categories</h4>
    </div>
  </div>

  <main class="container menu-page">
    <section class="section-head">
      <p class="section-label">Full Bakery Menu</p>
      <h1 class="section-title">Explore Our Complete Collection</h1>
      <p class="section-sub">Browse every cake, dessert and premium creation from our bakery catalogue — 300+ handcrafted items delivered fresh.</p>
    </section>

    <div class="category-tabs" id="categoryTabs"></div>
    <div id="menuContent">
      <div class="section-note" style="text-align:center; padding: 40px 0; color: var(--text-soft);">Loading bakery menu...</div>
    </div>
  </main>

  <script src="./bakery-menu.js"></script>
  <script>
    const products = window.bakeryMenu || [];
    const menuContent = document.getElementById('menuContent');
    const categoryTabs = document.getElementById('categoryTabs');
    const categoryMap = products.reduce((acc, product) => {
      const category = product.category || 'Other';
      if (!acc[category]) acc[category] = [];
      acc[category].push(product);
      return acc;
    }, {});



    const categoryNames = Object.keys(categoryMap);

    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }

    function buildCategoryTabs() {
      categoryTabs.innerHTML = categoryNames.map(name => {
        return `<a href="#${slugify(name)}" class="category-pill">${name} (${categoryMap[name].length})</a>`;
      }).join('');
    }

    function buildCategorySection(category, items) {
      const heading = `<div class="category-section" id="${slugify(category)}">
        <div class="category-header">
          <div>
            <h2>${category}</h2>
            <div class="category-count">${items.length} items</div>
          </div>
        </div>`;

      const cards = items.map(p => {
        const oldPriceHTML = p.oldPrice ? `<span class="product-price-old">₹${p.oldPrice}</span>` : '';
        const ribbon = p.tag ? `<div class="product-tag-ribbon">${p.tag}</div>` : '';
        const stars = '★'.repeat(p.rating) + '☆'.repeat(5 - p.rating);
        return `
          <article class="product-card">
            <div class="product-img">
              <img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.onerror=null; this.src='https://images.pexels.com/photos/1089522/pexels-photo-1089522.jpeg?auto=compress&cs=tinysrgb&h=650&w=940'" />
              ${ribbon}
            </div>
            <div class="product-body">
              <div class="product-name">${p.name}</div>
              <div class="product-flavor">${p.flavor}</div>
              <div class="product-stars">${stars} <span>(${p.reviews})</span></div>
              <div class="product-footer">
                <div>
                  <span class="product-price">₹${p.price}</span>
                  ${oldPriceHTML}
                </div>
                <button class="add-to-cart" onclick="window.location.href='checkout.html'">Order</button>
              </div>
            </div>
          </article>`;
      }).join('');

      return `${heading}<div class="products-grid">${cards}</div></div>`;
    }

    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    function buildMobileCategories() {
      const container = document.getElementById('mobileCategories');
      categoryNames.forEach(cat => {
        const link = document.createElement('a');
        link.href = `#${slugify(cat)}`;
        link.textContent = cat;
        link.style.cssText = 'font-size: 1.2rem; font-weight: 500; color: var(--brown-dark);';
        link.onclick = toggleMobileMenu;
        container.appendChild(link);
      });
    }

    function buildMenu() {
      if (!products.length) {
        menuContent.innerHTML = '<div style="text-align:center; padding:40px 0; color: var(--text-soft);">Menu data could not load.</div>';
        return;
      }

      buildCategoryTabs();
      buildMobileCategories();
      const sections = categoryNames.map(name => buildCategorySection(name, categoryMap[name]));
      menuContent.innerHTML = sections.join('');
    }

    buildMenu();
  </script>
</body>
</html>
