<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to your Cake Lounge account to track orders and manage your favorites.">
  <title>Login — Cake Lounge</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--chocolate) 0%, var(--brown) 100%);
      padding: 24px;
    }
    .auth-card {
      background: var(--white);
      padding: 40px;
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 450px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .auth-logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--chocolate);
      margin-bottom: 30px;
    }
    .auth-logo span { color: var(--rose); }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text);
    }
    .auth-subtitle {
      color: var(--text-soft);
      font-size: 0.9rem;
      margin-bottom: 30px;
    }
    .auth-form { text-align: left; }
    .auth-group { margin-bottom: 20px; }
    .auth-group label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 8px;
    }
    .auth-group input {
      width: 100%;
      padding: 14px;
      border: 2px solid var(--cream-dark);
      border-radius: var(--radius-sm);
      outline: none;
      transition: var(--transition);
    }
    .auth-group input:focus { border-color: var(--rose); }
    .auth-btn {
      width: 100%;
      padding: 15px;
      background: var(--rose-deep);
      color: var(--white);
      border: none;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: var(--transition);
    }
    .auth-btn:hover { background: var(--brown); transform: translateY(-2px); }
    .auth-divider {
      margin: 24px 0;
      display: flex;
      align-items: center;
      color: var(--text-soft);
      font-size: 0.8rem;
    }
    .auth-divider::before, .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--cream-dark);
    }
    .auth-divider span { padding: 0 10px; }
    .google-btn {
      width: 100%;
      padding: 12px;
      background: var(--white);
      border: 2px solid var(--cream-dark);
      border-radius: 50px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: var(--transition);
    }
    .google-btn:hover { background: var(--cream); }
    .auth-footer {
      margin-top: 30px;
      font-size: 0.9rem;
      color: var(--text-soft);
    }
    .auth-footer a { color: var(--rose-deep); font-weight: 600; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Cake <span>Lounge</span></div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Please enter your details to sign in.</p>

      <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='index.html';">
        <div class="auth-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@example.com" required>
        </div>
        <div class="auth-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="auth-btn">Sign In</button>
      </form>

      <div class="auth-divider"><span>OR</span></div>

      <button class="google-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18">
        Continue with Google
      </button>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create account</a>
      </div>
    </div>
  </div>
</body>
</html>
